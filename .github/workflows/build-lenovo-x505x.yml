name: Build Lenovo X505X Kernel with KSU and SUSFS

on:
  workflow_dispatch: # Allows you to manually trigger the build with a single click

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Compiling Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache cpio flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Download Proton Clang Toolchain
      run: |
        mkdir clang
        cd clang
        git clone --depth=1 https://github.com .
        echo "$(pwd)/bin" >> $GITHUB_PATH

    - name: Inject KernelSU-Next (Legacy)
      run: |
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

    - name: Inject SUSFS Filesystem Patches
      run: |
        git clone --depth=1 https://gitlab.com susfs_source
        # Applies filesystem path-hiding hooks directly to your kernel tree
        cp susfs_source/KernelSU/Explanation_And_Patches_For_KernelSU/Next/*.patch ./
        patch -p1 < *susfs*.patch || echo "Proceeding with manual checks"

    - name: Configure Kernel Flags
      run: |
        # Appends mandatory configuration variables to the default configuration layout
        DEFCONFIG="arch/arm64/configs/amar_defconfig"
        echo "CONFIG_KPROBES=y" >> $DEFCONFIG
        echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG
        echo "CONFIG_KERNELSU=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
        echo "CONFIG_SUSFS_SECURE_MODE=y" >> $DEFCONFIG

    - name: Run Compilation
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        
        make O=out amar_defconfig
        make O=out -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        git clone --depth=1 https://github.com zipped_package
        cp out/arch/arm64/boot/Image.gz-dtb zipped_package/
        cd zipped_package
        zip -r ../X505X-KSU-SUSFS-Kernel.zip *

    - name: Upload Finished Bootable Package
      uses: actions/upload-artifact@v4
      with:
        name: Lenovo-X505X-Kernel-Zip
        path: X505X-KSU-SUSFS-Kernel.zip
